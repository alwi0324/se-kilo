<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard Capaian Pendataan SE2026</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <script src="getSheetData.js"></script>
    <script src="ml.js" defer></script>
    <link rel="stylesheet" href="gaya.css" />
  </head>
  <body
    class="theme-transition bg-slate-50 text-slate-800 font-sans min-h-screen flex flex-col md:flex-row overflow-x-hidden"
  >
    <!-- HEADER MOBILE -->
    <header
      class="theme-transition md:hidden bg-white border-b border-slate-200 p-4 flex items-center justify-between sticky top-0 z-40 shadow-xs"
    >
      <div class="flex items-center space-x-3">
        <div class="bg-amber-500 text-white p-2 rounded-lg">
          <i class="fa-solid fa-chart-line text-lg"></i>
        </div>
        <div>
          <h1 class="font-bold text-base leading-none text-slate-950">
            SE2026
          </h1>
          <p class="text-xs text-slate-500">Monitoring Capaian</p>
        </div>
      </div>

      <div class="flex items-center space-x-2">
        <button
          onclick="toggleTheme()"
          class="theme-transition p-2 rounded-lg hover:bg-slate-100 text-amber-500 cursor-pointer"
        >
          <i class="mobile-theme-icon fa-solid fa-sun"></i>
        </button>
        <button
          onclick="toggleSidebar()"
          class="theme-transition p-2 rounded-lg hover:bg-slate-100 text-slate-400"
        >
          <i class="fa-solid fa-bars text-xl"></i>
        </button>
      </div>
    </header>

    <!-- BACKDROP SIDEBAR MOBILE -->
    <div
      id="sidebar-backdrop"
      onclick="toggleSidebar()"
      class="fixed inset-0 bg-black/40 z-40 md:hidden opacity-0 pointer-events-none transition-opacity duration-300 backdrop-blur-xs"
    ></div>

    <!-- SIDEBAR -->
    <aside
      id="sidebar"
      class="theme-transition fixed inset-y-0 left-0 w-64 bg-white border-r border-slate-200 flex flex-col justify-between p-4 z-50 transform -translate-x-full transition-transform duration-300 ease-out md:translate-x-0 md:static md:h-screen md:z-20"
    >
      <div>
        <!-- Header Sidebar (Desktop) -->
        <div
          class="hidden md:flex items-center justify-between mb-6 pb-4 border-b border-slate-100"
        >
          <div class="flex items-center space-x-3">
            <div
              class="bg-amber-500 text-white p-2 rounded-lg shadow-sm shadow-amber-500/20"
            >
              <i class="fa-solid fa-chart-line text-xl"></i>
            </div>
            <div>
              <h1 class="font-bold text-lg leading-tight text-slate-950">
                SE2026
              </h1>
              <p class="text-xs text-slate-500">Monitoring Capaian</p>
            </div>
          </div>
          <!-- Tombol Dark Mode Desktop -->
          <button
            onclick="toggleTheme()"
            class="theme-transition p-2 rounded-lg hover:bg-slate-100 text-amber-500 cursor-pointer"
          >
            <i class="desktop-theme-icon fa-solid fa-sun"></i>
          </button>
        </div>

        <!-- Header Sidebar Mobile -->
        <div
          class="md:hidden flex items-center justify-between mb-6 pb-4 border-b border-slate-100"
        >
          <span
            class="text-xs font-bold uppercase tracking-wider text-slate-400"
            >Menu Navigasi</span
          >
          <button
            onclick="toggleSidebar()"
            class="text-slate-400 hover:text-slate-600"
          >
            <i class="fa-solid fa-xmark text-lg"></i>
          </button>
        </div>

        <!-- Menu Navigasi -->
        <nav class="space-y-1">
          <button
            onclick="switchMenu('kecamatan')"
            id="menu-kecamatan"
            class="theme-transition w-full flex items-center space-x-3 px-4 py-3 rounded-xl text-sm font-medium text-left bg-amber-500 text-white shadow-xs cursor-pointer"
          >
            <i class="fa-solid fa-map-location-dot w-5 text-center"></i>
            <span>Progress Kecamatan</span>
          </button>
          <button
            onclick="switchMenu('sls')"
            id="menu-sls"
            class="theme-transition w-full flex items-center space-x-3 px-4 py-3 rounded-xl text-sm font-medium text-left text-slate-600 hover:bg-slate-100/70 cursor-pointer"
          >
            <i class="fa-solid fa-layer-group w-5 text-center"></i>
            <span>Progress SLS</span>
          </button>
          <button
            onclick="switchMenu('ppl')"
            id="menu-ppl"
            class="theme-transition w-full flex items-center space-x-3 px-4 py-3 rounded-xl text-sm font-medium text-left text-slate-600 hover:bg-slate-100/70 cursor-pointer"
          >
            <i class="fa-solid fa-user-pen w-5 text-center"></i>
            <span>Progress PPL</span>
          </button>
          <button
            onclick="switchMenu('pml')"
            id="menu-pml"
            class="theme-transition w-full flex items-center space-x-3 px-4 py-3 rounded-xl text-sm font-medium text-left text-slate-600 hover:bg-slate-100/70 cursor-pointer"
          >
            <i class="fa-solid fa-user-shield w-5 text-center"></i>
            <span>Progress PML</span>
          </button>
        </nav>
      </div>

      <div
        class="text-xs text-center text-slate-400 pt-4 border-t border-slate-100"
      >
        &copy; 2026 Badan Pusat Statistik
      </div>
    </aside>

    <!-- MAIN CONTENT CONTAINER -->
    <main
      class="flex-1 p-4 md:p-8 overflow-y-auto h-[calc(100vh-65px)] md:h-screen"
    >
      <!-- TOP HEADER -->
      <header class="mb-6">
        <div>
          <h2
            id="main-title"
            class="text-2xl font-bold tracking-tight text-slate-950 dark:text-white"
          >
            Progress Capaian per Kecamatan
          </h2>
          <br />
          <!-- Tempat Informasi Update -->
          <p
            id="dashboard-update"
            class="text-xs text-slate-500 dark:text-slate-400 mt-1 flex items-center gap-1.5"
          >
            <i class="fa-regular fa-clock text-amber-500"></i>
            <span>Memuat waktu pembaruan...</span>
          </p>
        </div>
      </header>

      <section
        class="grid grid-cols-2 md:grid-cols-4 gap-3.5 mb-3.5 shadow-none bg-transparent"
      >
        <div
          class="theme-transition theme-card bg-white p-5 rounded-2xl border border-slate-300 shadow-md"
        >
          <span
            class="text-xs font-semibold text-slate-400 tracking-wider uppercase"
            >Total Target</span
          >
          <h3
            id="stat-target"
            class="text-xl font-bold mt-1 text-slate-950"
          ></h3>
        </div>
        <div
          class="theme-transition theme-card bg-white p-5 rounded-2xl border border-slate-300 shadow-md"
        >
          <span
            class="text-xs font-semibold text-slate-400 tracking-wider uppercase"
            >Open</span
          >
          <h3
            id="stat-blm-terdata"
            class="text-xl font-bold mt-1 text-slate-950"
          ></h3>
        </div>
        <div
          class="theme-transition theme-card bg-white p-5 rounded-2xl border border-slate-300 border-l-4 border-l-emerald-500 shadow-md"
        >
          <span
            class="text-xs font-semibold text-emerald-600 tracking-wider uppercase"
            >Terdata</span
          >
          <h3
            id="stat-realisasi"
            class="text-xl font-bold text-emerald-600 mt-1"
          ></h3>
        </div>
        <div
          class="theme-transition theme-card bg-white p-5 rounded-2xl border border-slate-300 border-l-4 border-l-amber-500 shadow-md"
        >
          <span
            class="text-xs font-semibold text-amber-600 tracking-wider uppercase"
            >Progress Saat Ini</span
          >
          <h3
            id="stat-persen"
            class="text-xl font-bold text-amber-600 mt-1"
          ></h3>
        </div>
      </section>

      <div class="mb-4 flex justify-start">
        <div
          id="toggle-view-container"
          class="theme-transition bg-slate-200 p-1 rounded-xl inline-flex"
        >
          <button
            onclick="switchView('chart')"
            id="view-btn-chart"
            class="theme-transition flex items-center space-x-2 px-4 py-2 rounded-lg text-sm font-medium shadow-xs text-slate-950 cursor-pointer"
          >
            <i class="fa-solid fa-chart-bar text-amber-500"></i>
            <span class="text-amber-500">Grafik</span>
          </button>
          <button
            onclick="switchView('table')"
            id="view-btn-table"
            class="theme-transition flex items-center space-x-2 px-4 py-2 rounded-lg text-sm font-medium text-slate-600 hover:text-slate-950 cursor-pointer"
          >
            <i class="fa-solid fa-table-list"></i>
            <span>Tabel</span>
          </button>
        </div>
      </div>

      <div
        id="pml-filter-container"
        class="hidden mb-4 flex flex-wrap items-center gap-4 bg-white dark:bg-slate-800 p-3 rounded-xl border border-slate-200 dark:border-slate-700"
      >
        <div class="flex items-center space-x-2">
          <label
            for="filter-pml"
            class="text-sm font-medium text-slate-600 dark:text-slate-400"
            >PML:</label
          >
          <select
            id="filter-pml"
            onchange="handlePmlFilterChange(this.value)"
            class="rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800 text-sm p-2 text-slate-800 dark:text-slate-200 focus:outline-none focus:ring-2 focus:ring-orange-500"
          ></select>
        </div>

        <div id="ppl-filter-wrapper" class="flex items-center space-x-2 hidden">
          <label
            for="filter-ppl"
            class="text-sm font-medium text-slate-600 dark:text-slate-400"
            >PPL:</label
          >
          <select
            id="filter-ppl"
            onchange="handlePplFilterChange(this.value)"
            class="rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800 text-sm p-2 text-slate-800 dark:text-slate-200 focus:outline-none focus:ring-2 focus:ring-orange-500"
          ></select>
        </div>
      </div>

      <!-- AREA KONTEN UTAMA -->
      <section
        class="theme-transition bg-white rounded-2xl border border-slate-200 p-6 shadow-xs"
      >
        <!-- TAMPILAN GRAFIK -->
        <div id="wrapper-chart" class="w-full relative min-h-[440px]">
          <canvas id="progressChart"></canvas>
        </div>

        <!-- TAMPILAN TABEL -->
        <div
          id="wrapper-table"
          class="hidden overflow-x-auto w-full max-h-[500px]"
        >
          <table class="w-full text-left border-collapse whitespace-normal">
            <thead>
              <tr
                class="border-b border-slate-200 dark:border-slate-700 text-slate-400 dark:text-slate-500 text-xs font-semibold uppercase tracking-wider"
              >
                <!-- 1. POJOK KIRI ATAS: Harus z-40 dan kombinasi top-0 left-0 -->
                <th
                  class="py-3 px-4 sticky top-0 left-0 bg-white dark:bg-slate-800 z-40 min-w-[110px]"
                  id="th-name"
                >
                  Kecamatan
                </th>

                <!-- 2. HEADER KOLOM LAINNYA: Gunakan top-0, z-30, dan background warna tema -->
                <th
                  class="py-3 px-4 w-48 text-center sticky top-0 bg-white dark:bg-slate-800 z-30"
                >
                  Progress
                </th>
                <th
                  class="py-3 px-4 text-right sticky top-0 bg-white dark:bg-slate-800 z-30"
                >
                  Muatan
                </th>
                <th
                  class="py-3 px-4 text-right sticky top-0 bg-white dark:bg-slate-800 z-30"
                >
                  Terdata
                </th>
                <th
                  class="py-3 px-4 text-right sticky top-0 bg-white dark:bg-slate-800 z-30"
                >
                  Open
                </th>
                <th
                  class="py-3 px-4 text-right sticky top-0 bg-white dark:bg-slate-800 z-30"
                >
                  Pending PML
                </th>
                <th
                  class="py-3 px-4 text-right sticky top-0 bg-white dark:bg-slate-800 z-30"
                >
                  Draft
                </th>
                <th
                  class="py-3 px-4 text-right sticky top-0 bg-white dark:bg-slate-800 z-30"
                >
                  Approved
                </th>
                <th
                  class="py-3 px-4 text-right sticky top-0 bg-white dark:bg-slate-800 z-30"
                >
                  Rejected
                </th>
                <th
                  class="py-3 px-4 text-right sticky top-0 bg-white dark:bg-slate-800 z-30"
                >
                  Revoked
                </th>
              </tr>
            </thead>
            <tbody
              id="table-body"
              class="theme-transition divide-y divide-slate-100 text-sm text-slate-700"
            >
            </tbody>
          </table>
        </div>
      </section>
    </main>
  </body>
</html>
